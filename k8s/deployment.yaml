apiVersion: apps/v1
kind: Deployment

metadata:
  name: python-devops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: python-devops-app

  template:
    metadata:
      labels:
        app: python-devops-app

    spec:
      containers:
      - name: python-devops-app
        image: srijansood01/python-devops-app:v1

        ports:
        - containerPort: 7000